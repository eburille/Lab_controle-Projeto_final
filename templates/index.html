<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Controle Real-Time</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f4f9; }
        .container { display: flex; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); flex: 1; }
        h2 { color: #333; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        .dado { font-size: 24px; font-weight: bold; color: #007BFF; margin: 10px 0; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input[type="range"] { width: 100%; }
        input[type="number"] { width: 80px; padding: 5px; font-size: 16px; }
        button { background: #28a745; color: white; border: none; padding: 10px 15px; font-size: 16px; border-radius: 5px; cursor: pointer; margin-top: 15px; }
        button:hover { background: #218838; }
    </style>
</head>
<body>

    <h1>Interface de Controle e Telemetria (100ms)</h1>
    
    <div class="container">
        <div class="card">
            <h2>Dados do Objeto (Telemetria)</h2>
            <div>Posição Atual:</div>
            <div id="pos_atual" class="dado">0.00 m</div>
            
            <div>Velocidade Atual:</div>
            <div id="vel_atual" class="dado">0.00 m/s</div>
        </div>

        <div class="card">
            <h2>Referências de Controle</h2>
            
            <label for="ref_pos">Posição Alvo (m):</label>
            <input type="range" id="ref_pos" min="-100" max="100" step="0.1" value="0" oninput="document.getElementById('val_pos').value = this.value">
            <input type="number" id="val_pos" value="0" step="0.1" oninput="document.getElementById('ref_pos').value = this.value">

            <label for="ref_vel">Velocidade Limite (m/s):</label>
            <input type="range" id="ref_vel" min="0" max="50" step="0.1" value="0" oninput="document.getElementById('val_vel').value = this.value">
            <input type="number" id="val_vel" value="0" step="0.1" oninput="document.getElementById('ref_vel').value = this.value">
            
            <br>
            <button onclick="enviarReferencia()">Enviar Referência</button>
        </div>
    </div>

    <script>
        // Conecta automaticamente ao servidor Socket.IO no mesmo host
        const socket = io();

        // 1. Escuta o evento de telemetria enviado a cada 100ms pelo servidor
        socket.on('atualizar_graficos', function(data) {
            document.getElementById('pos_atual').innerText = parseFloat(data.posicao).toFixed(2) + " m";
            document.getElementById('vel_atual').innerText = parseFloat(data.velocidade).toFixed(2) + " m/s";
        });

        // 2. Envia os dados de referência para o Flask
        function enviarReferencia() {
            const pos = document.getElementById('ref_pos').value;
            const vel = document.getElementById('ref_vel').value;
            
            socket.emit('nova_referencia_web', {
                posicao: pos,
                velocidade: vel
            });
        }
    </script>
</body>
</html>
